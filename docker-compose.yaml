services:
  postgres:
    image: postgres:15-alpine
    container_name: colabsync_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: colabsync_cache
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: colabsync_api
    restart: always
    env_file:
      - .env 
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
