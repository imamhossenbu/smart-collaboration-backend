

services:
  postgres:
    image: postgres:15-alpine
    container_name: colabsync_db
    restart: always
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_secure_password
      POSTGRES_DB: colabsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: colabsync_cache
    restart: always
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: colabsync_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
