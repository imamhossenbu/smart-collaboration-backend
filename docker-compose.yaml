version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: colabsync_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: colabsync_cache
    restart: always
    ports:
      - '6379:6379'

  api:
    build: .
    container_name: colabsync_api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
    # Ekhon api container er port direct bahirola jagaye expose na korleo cholbe,
    # karon Nginx ekhon wrapper hisebe kaj korbe.
    expose:
      - '${PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # --- Ekhane Nginx Service-ti Add Kora Holo ---
  nginx:
    image: nginx:alpine
    container_name: colabsync_proxy
    restart: always
    ports:
      - '80:80' # Bahir theke ekhon port 80 te hit korle Nginx e jabe
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Ekhane apnar file ti mount hbe
    depends_on:
      - api

volumes:
  pgdata:
